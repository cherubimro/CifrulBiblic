<circle cx="96" cy="155" fill="#d88" r="2.5"></circle>
<circle cx="113" cy="145" fill="#d88" r="2.5"></circle>
<!-- Ring 4 -->
<circle cx="130" cy="115" fill="#eaa" r="2"></circle>
<circle cx="147" cy="125" fill="#eaa" r="2"></circle>
<circle cx="164" cy="135" fill="#eaa" r="2"></circle>
<circle cx="181" cy="145" fill="#eaa" r="2"></circle>
