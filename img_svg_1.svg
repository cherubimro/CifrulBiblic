<?xml version="1.0" encoding="UTF-8"?>
<svg height="500" style="max-width:100%;" viewbox="0 0 700 500" width="700" xmlns="http://www.w3.org/2000/svg">
<rect fill="#fffff8" height="500" rx="8" stroke="#ddd" stroke-width="1" width="700"></rect>
<!-- Title -->
<text fill="#8B0000" font-family="Georgia,serif" font-size="16" font-weight="bold" text-anchor="middle" x="350" y="30">Numerele hexagonale — Steaua lui David (✡)</text>
<text fill="#555" font-family="monospace" font-size="12" text-anchor="middle" x="350" y="50">H(n) = n × (2n − 1) : puncte aranjate în inele hexagonale</text>
<!-- H(4) = 28 puncte - left -->
<text fill="#8B0000" font-family="Georgia,serif" font-size="14" font-weight="bold" text-anchor="middle" x="130" y="80">H(4) = 28</text>
<!-- Ring 1: center -->
<circle cx="130" cy="175" fill="#8B0000" r="4"></circle>
<!-- Ring 2 -->
<circle cx="130" cy="155" fill="#c44" r="3"></circle>
<circle cx="147" cy="165" fill="#c44" r="3"></circle>
